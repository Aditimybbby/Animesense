<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - AnimeSense Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🎬 AnimeSense</h2>
                <p>Admin Panel</p>
            </div>
            
            <ul class="sidebar-menu">
                <li>
                    <a th:href="@{/admin/dashboard}">
                        <span class="icon">📊</span> Dashboard
                    </a>
                </li>
                <li class="active">
                    <a th:href="@{/admin/users}">
                        <span class="icon">👥</span> Users
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/anime}">
                        <span class="icon">🎬</span> Anime
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/broadcast}">
                        <span class="icon">📢</span> Broadcast
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/logout}" class="logout">
                        <span class="icon">🚪</span> Logout
                    </a>
                </li>
            </ul>
        </nav>
        
        <main class="main-content">
            <header class="page-header">
                <h1>Users</h1>
            </header>
            
            <div class="card">
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Favorites</th>
                                <th>Last Active</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.username != null ? '@' + user.username : '-'}"></td>
                                <td th:text="${favoriteCounts.get(user.userId)}"></td>
                                <td th:text="${#temporals.format(user.lastActive, 'yyyy-MM-dd HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/admin/users/{id}(id=${user.userId})}" class="btn btn-sm">View Details</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
