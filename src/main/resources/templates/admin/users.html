<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — AnimeSense Admin</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="sakura-bg"></div>
<div class="sakura-overlay"></div>

<div class="as-layout">

  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-row">
        <div class="sb-icon">🎌</div>
        <div class="sb-name">AnimeSense</div>
      </div>
      <div class="sb-sub">Admin Nexus</div>
    </div>
    <div class="sb-nav">
      <div class="sb-label">Main</div>
      <a th:href="@{/admin/dashboard}" class="sb-link"><span class="sb-icon-el">⊞</span> Dashboard</a>
      <a th:href="@{/admin/users}" class="sb-link active"><span class="sb-icon-el">👥</span> Users</a>
      <a th:href="@{/admin/anime}" class="sb-link"><span class="sb-icon-el">🎌</span> Anime</a>
      <div class="sb-label">Tools</div>
      <a th:href="@{/admin/broadcast}" class="sb-link"><span class="sb-icon-el">📡</span> Broadcast<span class="sb-pill">LIVE</span></a>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">A</div>
        <div><div class="sb-uname">Admin</div><div class="sb-urole">Super Admin</div></div>
      </div>
      <a th:href="@{/admin/logout}" class="sb-logout">⏻ &nbsp;Sign Out</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Users</span>
      <div class="topbar-right">
        <div class="topbar-bell">🔔<span class="bell-dot"></span></div>
      </div>
    </div>

    <div class="page-body">
      <div class="page-head anim-in">
        <div>
          <h1>User Management</h1>
          <p>All registered users and their activity</p>
        </div>
      </div>

      <div class="panel anim-in anim-d1">
        <div class="panel-head">
          <span class="panel-title">All Users</span>
          <span class="badge badge-ghost" th:text="${#lists.size(users)} + ' total'">0 total</span>
        </div>
        <div style="overflow-x:auto;">
          <table class="as-table">
            <thead>
              <tr>
                <th>User</th>
                <th>ID</th>
                <th>Username</th>
                <th>Favorites</th>
                <th>Last Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="user : ${users}">
                <td>
                  <div class="td-user">
                    <div class="td-avatar"
                         th:text="${#strings.substring(user.firstName != null ? user.firstName : 'U', 0, 2).toUpperCase()}">?</div>
                    <div class="td-user-name" th:text="${user.firstName}">—</div>
                  </div>
                </td>
                <td class="td-id" th:text="'#' + ${user.userId}">—</td>
                <td style="color:var(--tx-muted);font-size:11px;font-family:var(--font-mono);"
                    th:text="${user.username != null ? '@' + user.username : '—'}">—</td>
                <td>
                  <span class="badge badge-sak"
                        th:text="${favoriteCounts.get(user.userId) != null ? favoriteCounts.get(user.userId) : 0}">0</span>
                </td>
                <td style="color:var(--tx-muted);font-size:11px;font-family:var(--font-mono);"
                    th:text="${#temporals.format(user.lastActive,'yyyy-MM-dd HH:mm')}">—</td>
                <td>
                  <a th:href="@{/admin/users/{id}(id=${user.userId})}"
                     class="btn btn-ghost btn-sm">View →</a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" style="color:var(--tx-muted);text-align:center;padding:30px;">No users found</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
