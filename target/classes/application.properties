# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=AnimeSense Bot

# Database Configuration (H2 for development, MySQL for production)
# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./data/animesense
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Database (Production - uncomment and configure)
#spring.datasource.url=jdbc:mysql://localhost:3306/animesense?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=your_password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Telegram Bot Configuration
telegram.bot.token=8249305108:AAFf6eTMm9eV9QtviupZPlCwIBMPsqdiAwk
telegram.bot.username=animesense_bot

# Admin Configuration
admin.username=admin
admin.password=admin123
admin.telegram.ids=8447673079

# Jikan API Configuration
jikan.api.base-url=https://api.jikan.moe/v4
jikan.api.rate-limit-ms=3000

# Recommendation Configuration
recommendation.max-per-session=5
recommendation.min-rating=6.0
recommendation.genre-weight-increment=0.1
recommendation.genre-weight-decrement=0.05

# Logging
logging.level.root=INFO
logging.level.com.animesense=DEBUG
logging.pattern.console=%d{HH:mm:ss} - %msg%n

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
