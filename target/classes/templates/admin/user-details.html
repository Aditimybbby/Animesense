<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - AnimeSense Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🎬 AnimeSense</h2>
                <p>Admin Panel</p>
            </div>
            
            <ul class="sidebar-menu">
                <li>
                    <a th:href="@{/admin/dashboard}">
                        <span class="icon">📊</span> Dashboard
                    </a>
                </li>
                <li class="active">
                    <a th:href="@{/admin/users}">
                        <span class="icon">👥</span> Users
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/anime}">
                        <span class="icon">🎬</span> Anime
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/broadcast}">
                        <span class="icon">📢</span> Broadcast
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/logout}" class="logout">
                        <span class="icon">🚪</span> Logout
                    </a>
                </li>
            </ul>
        </nav>
        
        <main class="main-content">
            <header class="page-header">
                <h1>User Details</h1>
                <a th:href="@{/admin/users}" class="btn">← Back</a>
            </header>
            
            <div class="content-grid">
                <div class="card">
                    <div class="card-header">
                        <h2>User Information</h2>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="label">User ID:</span>
                            <span th:text="${user.userId}"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Name:</span>
                            <span th:text="${user.firstName}"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Username:</span>
                            <span th:text="${user.username != null ? '@' + user.username : 'N/A'}"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Admin:</span>
                            <span th:if="${user.isAdmin}" class="badge badge-success">✅ Yes</span>
                            <span th:unless="${user.isAdmin}" class="badge">No</span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Joined:</span>
                            <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="label">Last Active:</span>
                            <span th:text="${#temporals.format(user.lastActive, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2>Statistics</h2>
                    </div>
                    <div class="card-body">
                        <div class="stat-item">
                            <span class="stat-label">Total Anime:</span>
                            <span class="stat-value" th:text="${favorites.size()}"></span>
                        </div>
                        
                        <div class="stat-item">
                            <span class="stat-label">Average Rating:</span>
                            <span class="stat-value" th:text="${#numbers.formatDecimal(avgRating, 1, 1)} + '/10'"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h2>Favorite Anime</h2>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Anime</th>
                                <th>Status</th>
                                <th>User Rating</th>
                                <th>Added</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="favorite : ${favorites}">
                                <td>
                                    <div class="anime-title">
                                        <strong th:text="${favorite.anime.title}"></strong>
                                        <small th:if="${favorite.anime.genres}" th:text="${favorite.anime.genres}"></small>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge" th:text="${favorite.status.displayName}"></span>
                                </td>
                                <td>
                                    <span th:if="${favorite.userRating}" th:text="${favorite.userRating} + '/10'"></span>
                                    <span th:unless="${favorite.userRating}">-</span>
                                </td>
                                <td th:text="${#temporals.format(favorite.addedAt, 'yyyy-MM-dd')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
